<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clinic Queue Management</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{
  --green:#1b7f3b;
  --light:#e8f5ec;
}
body{
  margin:0;
  font-family: system-ui;
  background:#f4f7f5;
}
header{
  background:var(--green);
  color:#fff;
  padding:10px;
  text-align:center;
}
nav{
  display:flex;
}
nav button{
  flex:1;
  padding:10px;
  border:none;
  background:#d9eee1;
  cursor:pointer;
}
nav button.active{
  background:var(--green);
  color:#fff;
}
section{
  display:none;
  padding:15px;
}
section.active{
  display:block;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}
input,button,select,textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
}
button{
  background:var(--green);
  color:#fff;
  border:none;
  border-radius:5px;
}
.queue span{
  display:inline-block;
  padding:5px 10px;
  background:var(--light);
  margin:3px;
  border-radius:5px;
}
.small{
  font-size:13px;
  color:#555;
}
@media(min-width:768px){
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
}
</style>
</head>

<body>

<header>
  <h2 id="clinicName">Clinic Queue System</h2>
</header>

<nav>
  <button class="active" onclick="openTab('patient')">ဘိုကင်ယူမည်</button>
  <button onclick="openTab('admin')">Admin</button>
</nav>

<!-- ================= PATIENT TAB ================= -->
<section id="patient" class="active">
  <div class="card">
    <h3>ဘိုကင်တင်ရန်</h3>

    <label>လူနာအမည်</label>
    <input id="pName"/>

    <label>ဖုန်းနံပါတ် (မထည့်လည်းရ)</label>
    <input id="pPhone"/>

    <label>နေ့ရက်ရွေးချယ်ပါ</label>
    <input type="date" id="pDate"/>

    <button onclick="addBooking()">ဘိုကင်ရယူမည်</button>

    <p class="small">
      အဆင်မပြေမှုရှိပါက 095072256 သို့ဆက်သွယ်နိုင်ပါသည်
    </p>
  </div>
</section>

<!-- ================= ADMIN TAB ================= -->
<section id="admin">
  <div class="card" id="loginBox">
    <h3>Admin Login</h3>
    <input type="password" id="adminPass" placeholder="Password"/>
    <button onclick="login()">Login</button>
  </div>

  <div id="adminPanel" style="display:none">

    <h3>QUEUE DASHBOARD</h3>

    <div class="card queue">
      <b>Booking :</b> <span id="qBooking"></span><br>
      <b>Waiting :</b> <span id="qWaiting"></span><br>
      <b>Calling :</b> <span id="qCalling"></span><br>
      <b>Completed :</b> <span id="qCompleted"></span>
    </div>

    <div class="card">
      <label>Date Filter</label>
      <input type="date" id="filterDate" onchange="loadBookings()"/>
    </div>

    <div class="card">
      <h4>Admin Booking</h4>
      <input id="aName" placeholder="လူနာအမည်"/>
      <input id="aPhone" placeholder="ဖုန်း"/>
      <input type="date" id="aDate"/>
      <button onclick="addAdminBooking()">ဘိုကင်ထည့်မည်</button>
    </div>

    <div class="card">
      <h4>Clinic Settings</h4>
      <input id="cName" placeholder="Clinic Name"/>
      <input type="file" id="cLogo"/>
      <button onclick="saveClinic()">Save</button>
    </div>

    <div class="card">
      <h4>Patient List</h4>
      <div id="list"></div>
    </div>

  </div>
</section>

<script>
/* ========= FIREBASE ========= */
const firebaseConfig ={
  apiKey: "AIzaSyCv7Ur--zmS24r49BELdxw9YAoVsrDOdsI",
  authDomain: "digaryu-29662.firebaseapp.com",
  databaseURL: "https://digaryu-29662-default-rtdb.firebaseio.com",
  projectId: "digaryu-29662",
  storageBucket: "digaryu-29662.firebasestorage.app",
  messagingSenderId: "720213822996",
  appId: "1:720213822996:web:1161f95fec068632aa2101",
  measurementId: "G-S7C3Q3EFQ2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

/* ========= UI ========= */
function openTab(tab){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

/* ========= DATE LIMIT ========= */
const today = new Date();
const max = new Date();
max.setDate(today.getDate()+7);
pDate.min = today.toISOString().split("T")[0];
pDate.max = max.toISOString().split("T")[0];

/* ========= BOOKING ========= */
function addBooking(){
  if(!pName.value || !pDate.value) return alert("အမည်နှင့် နေ့ရက်လိုအပ်ပါသည်");

  db.collection("bookings").add({
    name:pName.value,
    phone:pPhone.value,
    date:pDate.value,
    status:"booking",
    time:Date.now(),
    note:""
  });
  alert("ဘိုကင်အောင်မြင်ပါသည်");
  pName.value=pPhone.value="";
}

/* ========= ADMIN LOGIN ========= */
function login(){
  db.collection("admin").doc("auth").get().then(d=>{
    if(!d.exists){
      db.collection("admin").doc("auth").set({password:"admin"});
      alert("Default password = admin");
    }else if(d.data().password===adminPass.value){
      loginBox.style.display="none";
      adminPanel.style.display="block";
      loadBookings();
    }else alert("Password မမှန်ပါ");
  });
}

/* ========= LOAD BOOKINGS ========= */
function loadBookings(){
  list.innerHTML="";
  let qB=[],qW=[],qC=[],qD=[];
  const fDate=filterDate.value;

  db.collection("bookings")
  .orderBy("time","desc")
  .get().then(snap=>{
    snap.forEach(d=>{
      const b=d.data();
      if(fDate && b.date!==fDate) return;

      qB.push(d.id);

      if(b.status==="waiting") qW.push(d.id);
      if(b.status==="calling") qC.push(d.id);
      if(b.status==="completed") qD.push(d.id);

      const div=document.createElement("div");
      div.innerHTML=`
        <b>${b.name}</b> (${b.date})<br>
        <textarea onchange="updateNote('${d.id}',this.value)">${b.note||""}</textarea>
        <button onclick="setStatus('${d.id}','calling')">ခေါ်မည်</button>
        <button onclick="setStatus('${d.id}','waiting')">စောင့်ဆိုင်း</button>
        <button onclick="setStatus('${d.id}','completed')">ပြီးစီး</button>
        <button onclick="del('${d.id}')">ဖျက်</button>
        <hr>`;
      list.appendChild(div);
    });

    qBooking.innerText=qB.join(", ");
    qWaiting.innerText=qW.join(", ");
    qCalling.innerText=qC.join(", ");
    qCompleted.innerText=qD.join(", ");
  });
}

/* ========= ACTIONS ========= */
function setStatus(id,s){
  db.collection("bookings").doc(id).update({status:s});
  loadBookings();
}
function del(id){
  if(confirm("ဖျက်မလား?")){
    db.collection("bookings").doc(id).delete();
    loadBookings();
  }
}
function updateNote(id,val){
  db.collection("bookings").doc(id).update({note:val});
}

/* ========= ADMIN BOOKING ========= */
function addAdminBooking(){
  if(!aName.value||!aDate.value) return;
  db.collection("bookings").add({
    name:aName.value,
    phone:aPhone.value,
    date:aDate.value,
    status:"booking",
    time:Date.now(),
    note:""
  });
  aName.value=aPhone.value="";
  loadBookings();
}

/* ========= CLINIC ========= */
function saveClinic(){
  db.collection("settings").doc("clinic").set({
    name:cName.value
  });
  clinicName.innerText=cName.value;
}
</script>

</body>
</html>
